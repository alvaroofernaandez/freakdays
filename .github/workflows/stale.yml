name: Stale

# Marks abandoned issues and PRs as stale, then closes them if there's no
# follow-up activity. Keeps the backlog signal-to-noise high.

on:
  schedule:
    # Daily at 03:00 UTC.
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale issues/PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: |
            This issue has had no activity for 60 days and is now marked as
            stale. Comment, add a reaction, or update with new info to keep
            it open — otherwise it will be closed in 14 days.
          close-issue-message: |
            Closing for inactivity. Reopen if this is still relevant.
          exempt-issue-labels: 'pinned,security,help wanted,good first issue'
          # PRs
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            This PR has had no activity for 30 days. Push a new commit,
            rebase, or comment to keep it open — otherwise it will be
            closed in 14 days. Reopen anytime.
          close-pr-message: |
            Closing for inactivity. Reopen and rebase when you have the
            cycles to finish it.
          exempt-pr-labels: 'pinned,security,blocked,wip'
          delete-branch: true

          operations-per-run: 50
          ascending: true
