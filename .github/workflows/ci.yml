name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.6.3'

jobs:
  install:
    name: Install (cached)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

  format-check:
    name: Prettier
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        package: [freak-days-api, freak-days]
    # NOTE: Web typecheck has pre-existing TS errors (Vue overloads in
    # RegisterForm, CreatePartyModal, etc.). Step is non-blocking until
    # that debt is resolved.
    continue-on-error: ${{ matrix.package == 'freak-days' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ${{ matrix.package }} typecheck

  test:
    name: Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        package: [freak-days, freak-days-api]
    # NOTE: Web tests have 5 known pre-existing failures (useIndexPage,
    # useOrganizationContext x3, profile). Step is non-blocking until that
    # debt is resolved.
    continue-on-error: ${{ matrix.package == 'freak-days' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ${{ matrix.package }} test

  coverage:
    name: Coverage (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        package: [freak-days, freak-days-api]
    # Web coverage is non-blocking while the 5 pre-existing test failures
    # block report generation. API coverage gates at the (low) thresholds
    # declared in packages/api/jest.config.js.
    continue-on-error: ${{ matrix.package == 'freak-days' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ${{ matrix.package }} test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package }}
          path: packages/${{ matrix.package == 'freak-days' && 'web' || 'api' }}/coverage
          retention-days: 14
          if-no-files-found: ignore

  build:
    name: Build (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        package: [freak-days, freak-days-api]
    # NOTE: Both packages have pre-existing build failures on main:
    # - web: missing composables/useSupabase.ts (referenced by PartyAnimeList,
    #   TierListEditor).
    # - api: schema-code mismatch — organizationId/user/organization/membership
    #   used in services but absent from prisma/schema.prisma. tsc --noEmit -p
    #   tsconfig.json ignores these files (different tsconfig.build.json scope).
    # Non-blocking until separate fix PRs land.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ${{ matrix.package }} build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: install
    # Smoke E2E suite. Currently a single redirect-chain assertion; non-
    # blocking while the surface stabilises and we wire a Clerk test
    # session into CI secrets (auth happy path will graduate to gating
    # once that secret exists).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: pnpm --filter freak-days e2e:install
      - name: Build web (preview server needs the .output)
        run: pnpm --filter freak-days build
      - run: pnpm --filter freak-days e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: packages/web/test-results
          retention-days: 7
          if-no-files-found: ignore
