name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.6.3'

jobs:
  install:
    name: Install (cached)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

  format-check:
    name: Prettier
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        package: [freak-days-api, freak-days]
    # NOTE: Web typecheck has pre-existing TS errors (Vue overloads in
    # RegisterForm, CreatePartyModal, etc.). Step is non-blocking until
    # that debt is resolved.
    continue-on-error: ${{ matrix.package == 'freak-days' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Force regeneration scoped to this matrix package. Both packages share
      # @prisma/client in node_modules but ship divergent schemas, so the
      # parallel postinstall race during 'pnpm install -r' may leave the
      # client mid-state. Regenerating here pins the client to the package
      # we're about to typecheck.
      - run: pnpm --filter ${{ matrix.package }} prisma:generate
      - run: pnpm --filter ${{ matrix.package }} typecheck

  test:
    name: Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        package: [freak-days, freak-days-api]
    # NOTE: Web tests have 7 known pre-existing failures (see #10 backlog).
    # Step is non-blocking until that debt is resolved.
    continue-on-error: ${{ matrix.package == 'freak-days' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ${{ matrix.package }} prisma:generate
      - run: pnpm --filter ${{ matrix.package }} test

  build:
    name: Build (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        package: [freak-days, freak-days-api]
    # NOTE: Both packages have pre-existing build failures on main:
    # - web: missing composables/useSupabase.ts (referenced by PartyAnimeList,
    #   TierListEditor).
    # - api: schema-code mismatch — organizationId/user/organization/membership
    #   used in services but absent from prisma/schema.prisma. tsc --noEmit -p
    #   tsconfig.json ignores these files (different tsconfig.build.json scope).
    # Non-blocking until separate fix PRs land.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ${{ matrix.package }} prisma:generate
      - run: pnpm --filter ${{ matrix.package }} build
